# ==================================================
# VelioraGacha Rewards V2.7
# Default crate utama sengaja EMPTY agar owner bisa setting sendiri.
# Kalau crate reward kosong, player tidak bisa membuka crate dan key tidak berkurang.
# Test crate punya reward default hanya jika config:
# settings.test-crate-has-default-rewards: true
#
# Cara isi:
# 1. Pakai /vgcreate gui > Crate Settings > Reward Editor
# 2. Atau copy contoh dari rewards-examples.yml ke file ini
#
# Rarity final: uncommon, common, rare, epic, mythic
# Type reward: ITEM atau COMMAND
# Placeholder command: %player%, %crate%, %crate_display%, %reward%, %key%
# ==================================================
