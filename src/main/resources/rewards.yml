# ==================================================
# VelioraGacha Rewards V2.5
# Reward default aman dan tidak OP.
# Semua crate wajib punya minimal 1 reward valid sebelum bisa dibuka.
# Rarity final: uncommon, common, rare, epic, mythic.
# Alias lama legendary/legend/mythical tetap diterima sebagai mythic oleh loader.
# Placeholder command: %player%, %crate%, %crate_display%, %reward%, %key%
# Weight tidak harus total 100.
# Reward item dari GUI editor tersimpan di rewards-gui.yml dan digabung dengan file ini.
# ==================================================
