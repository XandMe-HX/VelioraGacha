# ==================================================
# VelioraGacha Rewards
# Reward default aman, tidak OP.
#
# Manual reward source utama:
# rewards.<crate>.<rarity>:
#   - type: ITEM
#     material: IRON_INGOT
#     amount: 8
#     display: '&fIron Ingot x8'
#     weight: 50
#
#   - type: COMMAND
#     command: 'eco give %player% 25000'
#     display: '&aMoney 25.000'
#     material: EMERALD
#     amount: 1
#     weight: 10
#
# Placeholder command:
# %player%, %crate%, %crate_display%, %reward%, %key%
# Weight tidak harus total 100. Semakin besar weight, semakin sering keluar.
# Item dari GUI editor tersimpan di rewards-gui.yml dan digabung dengan file ini.
# ==================================================
rewards:
  kinzai:
    common:
      - type: ITEM
        material: IRON_INGOT
        amount: 8
        display: '&fIron Ingot x8'
        weight: 50
      - type: ITEM
        material: EMERALD
        amount: 4
        display: '&aEmerald x4'
        weight: 35
      - type: ITEM
        material: GOLDEN_APPLE
        amount: 1
        display: '&6Golden Apple x1'
        weight: 15
    rare:
      - type: ITEM
        material: DIAMOND
        amount: 2
        display: '&bDiamond x2'
        weight: 20
      - type: COMMAND
        command: 'eco give %player% 25000'
        display: '&aMoney 25.000'
        material: EMERALD
        amount: 1
        weight: 10
