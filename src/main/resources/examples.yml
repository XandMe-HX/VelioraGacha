# ==================================================
# VelioraGacha Examples
# File ini hanya contoh. Tidak dibaca otomatis oleh plugin.
# Copy bagian yang kamu mau ke config.yml / crates.yml / keys.yml / rewards.yml.
# ==================================================

# ==================================================
# CONTOH ANIMATION BOX - MIRIP REFERENSI SCREENSHOT
# Copy ke config.yml > animation
# ==================================================
animation-box-example:
  enabled: true
  mode: BOX
  gui-size: 54
  title: '&8Opening %crate%'
  duration-ticks: 120
  start-speed-ticks: 1
  end-speed-ticks: 9
  close-delay-ticks: 45
  close-behavior: COMPLETE_REWARD
  sound-tick: BLOCK_NOTE_BLOCK_HAT
  sound-finish: ENTITY_PLAYER_LEVELUP
  filler-material: GRAY_STAINED_GLASS_PANE
  empty-material: BLACK_STAINED_GLASS_PANE
  marker-slot: 4
  marker-material: TORCH
  marker-name: '&a▼ HADIAH ▼'
  result-slot: 22
  highlight-material: LIME_STAINED_GLASS_PANE
  final-glow: true
  result:
    enabled: true
    keep-open-ticks: 45
    show-title: true
    show-actionbar: true
    send-chat: true
    title: '&aKamu Mendapatkan!'
    subtitle: '&f%reward%'
    actionbar: '&aReward: &f%reward%'
    chat: '%prefix% &aKamu mendapatkan reward: &f%reward%&a.'
    sound: ENTITY_PLAYER_LEVELUP
  box:
    marker-slot: 4
    result-slot: 22
    box-slots:
      - 11
      - 12
      - 13
      - 14
      - 15
      - 24
      - 33
      - 42
      - 41
      - 40
      - 39
      - 38
      - 29
      - 20

