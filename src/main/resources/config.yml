# ==================================================
# VelioraGacha V2.6 Configuration
# - No-key/wrong-key/no-reward bisa ACTIONBAR/TITLE/CHAT/BOTH
# - Animation mode: SLIDE / SPIN / SHUFFLE / TORNADO / WHEEL
# - Effect crate memakai tornado spiral kecil di sekitar shulker
# - Hologram support pages + fallback lines
# ==================================================
settings:
  prefix: '&8[&dVelioraGacha&8] '
  storage: YAML
  max-shop-amount: 64
  show-test-crate: true

economy:
  enabled: true
  money-format: '#,###'

messages:
  delivery:
    no-key: ACTIONBAR
    wrong-key: ACTIONBAR
    no-reward: ACTIONBAR
  cooldown:
    no-key-chat-seconds: 3
    wrong-key-chat-seconds: 3
    no-reward-chat-seconds: 5
  no-permission: '%prefix% &cKamu tidak punya izin.'
  player-only: '%prefix% &cCommand ini hanya untuk player.'
  reload-success: '%prefix% &aVelioraGacha berhasil direload.'
  invalid-key: '%prefix% &cKey tidak valid: &f%key%'
  invalid-crate: '%prefix% &cCrate tidak valid: &f%crate%'
  key-given: '%prefix% &aBerhasil memberi &f%amount%x %key% &ake &f%player%&a.'
  key-received: '%prefix% &aKamu menerima &f%amount%x %key%&a.'
  key-bought: '%prefix% &aBerhasil membeli &f%amount%x %key% &adengan harga &f%price%&a.'
  not-enough-money: '%prefix% &cUang kamu kurang. Butuh &f%price%&c.'
  economy-missing: '%prefix% &cEconomy Vault tidak tersedia.'
  no-key: '%prefix% &cKamu butuh &f%key_name% &cuntuk membuka crate ini. Beli di &f/key shop&c.'
  wrong-key: '%prefix% &cKey ini tidak cocok untuk crate ini.'
  no-reward: '%prefix% &cCrate ini belum punya reward. Isi dulu di &f/vgcreate gui &c-> Crate Settings.'
  crate-no-reward: '%prefix% &cCrate ini belum punya reward. Isi dulu di &f/vgcreate gui &c-> Crate Settings.'
  crate-placed: '%prefix% &aCrate &f%crate% &aberhasil dibuat.'
  crate-broken: '%prefix% &eCrate &f%crate% &edihapus.'
  reward-received: '%prefix% &aKamu mendapatkan reward: &f%reward%&a.'
  animation-running: '%prefix% &cKamu sedang membuka crate.'

animation:
  enabled: true
  mode: TORNADO
  # SLIDE / SPIN / SHUFFLE / TORNADO / WHEEL
  gui-size: 45
  title: '&8Opening %crate%'
  indicator-slot: 22
  duration-ticks: 130
  start-speed-ticks: 1
  end-speed-ticks: 9
  close-delay-ticks: 35
  close-behavior: COMPLETE_REWARD
  sound-tick: BLOCK_NOTE_BLOCK_HAT
  sound-finish: ENTITY_PLAYER_LEVELUP
  filler-mode: CLEAN
  clean-background-material: BLACK_STAINED_GLASS_PANE
  highlight-material: LIME_STAINED_GLASS_PANE
  final-glow: true
  marker:
    enabled: true
    top-slot: 13
    bottom-slot: 31
    material: LIME_STAINED_GLASS_PANE
    top-name: '&a▼ HADIAH ▼'
    bottom-name: '&a▲ HADIAH ▲'

effects:
  enabled: true
  interval-ticks: 3
  radius: 0.95
  radius-top: 0.45
  height: 1.85
  points-per-tick: 7
  rings: 3
  speed: 0.32
  y-speed: 0.05
  tornado-shape: true
  center-spark: true
  max-crates-per-tick: 40
  view-distance: 32

hologram:
  enabled: true
  provider: AUTO
  y-offset: 1.8
  update-ticks: 40
  nearest-player-radius: 8
  pages:
    - lines:
        - content: '%crate_prefix%&l%crate_display% CRATE%crate_suffix%'
          height: 0.3
        - content: '&7Crate rewards'
          height: 0.3
        - content: ''
          height: 0.3
        - content: '&fBuka peti ini untuk mendapatkan'
          height: 0.3
        - content: '&fitem common dan %crate_prefix%reward spesial%crate_suffix%'
          height: 0.3
        - content: '&fButuh %key_short_name% keys untuk membuka crate ini'
          height: 0.3
        - content: ''
          height: 0.3
        - content: '&fLevel reward: %level_reward%'
          height: 0.3
        - content: '&fKeys kamu: %crate_prefix%%keys% keys%crate_suffix%'
          height: 0.3
        - content: ''
          height: 0.3
        - content: '&fDapatkan keys reward dengan cara'
          height: 0.3
        - content: '%crate_prefix%membeli di &f/key shop %crate_suffix%(/key shop)'
          height: 0.3
  lines:
    - '%crate_prefix%&l%crate_display% CRATE%crate_suffix%'
    - '&7Crate rewards'
    - '&fKamu butuh %key_short_name% key'
    - '&fKeys kamu: %keys% keys'
    - '&fBeli di /key shop atau dari owner'

shop:
  title: '&8Key Shop'
  quantity-title: '&8Beli %key%'
  filler: BLACK_STAINED_GLASS_PANE

editor:
  default-weight: 10

no-key:
  knockback:
    enabled: true
    strength: 0.65
    y: 0.25
  sound: ENTITY_VILLAGER_NO

crates:
  drop-on-break: true
