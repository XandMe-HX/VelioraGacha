# ==================================================
# VelioraGacha V3.1 Configuration
# File utama plugin.
# File examples.yml dan rewards-examples.yml hanya contoh, tidak dibaca otomatis.
# ==================================================
settings:
  prefix: '&8[&dVelioraGacha&8] '
  storage: YAML
  max-shop-amount: 64
  show-test-crate: true
  test-crate-has-default-rewards: true

economy:
  enabled: true
  money-format: '#,###'

messages:
  delivery:
    no-key: ACTIONBAR
    wrong-key: ACTIONBAR
    no-reward: ACTIONBAR
  cooldown:
    no-key-chat-seconds: 3
    wrong-key-chat-seconds: 3
    no-reward-chat-seconds: 5
  no-permission: '%prefix% &cKamu tidak punya izin.'
  player-only: '%prefix% &cCommand ini hanya untuk player.'
  reload-success: '%prefix% &aVelioraGacha berhasil direload.'
  invalid-key: '%prefix% &cKey tidak valid: &f%key%'
  invalid-crate: '%prefix% &cCrate tidak valid: &f%crate%'
  key-given: '%prefix% &aBerhasil memberi &f%amount%x %key% &ake &f%player%&a.'
  key-received: '%prefix% &aKamu menerima &f%amount%x %key%&a.'
  key-bought: '%prefix% &aBerhasil membeli &f%amount%x %key% &adengan harga &f%price%&a.'
  not-enough-money: '%prefix% &cUang kamu kurang. Butuh &f%price%&c.'
  economy-missing: '%prefix% &cEconomy Vault tidak tersedia.'
  no-key: '%prefix% &cKamu butuh &f%key_name% &cuntuk membuka crate ini. Beli di &f/key shop&c.'
  wrong-key: '%prefix% &cKey ini tidak cocok untuk crate ini.'
  no-reward: '%prefix% &cCrate ini belum punya reward. Isi dulu di &f/vgcreate gui &c-> Crate Settings.'
  crate-no-reward: '%prefix% &cCrate ini belum punya reward. Isi dulu di &f/vgcreate gui &c-> Crate Settings.'
  crate-placed: '%prefix% &aCrate &f%crate% &aberhasil dibuat.'
  crate-broken: '%prefix% &eCrate &f%crate% &edihapus.'
  reward-received: '%prefix% &aKamu mendapatkan reward: &f%reward%&a.'
  animation-running: '%prefix% &cKamu sedang membuka crate.'

animation:
  enabled: true
  mode: BOX
  # SPIRAL / SNAKE / SIMPLE / BOX
  # Alias lama tetap aman:
  # TORNADO/SPIN -> SPIRAL, WHEEL -> BOX, SLIDE/SHUFFLE -> SIMPLE
  gui-size: 54
  title: '&8Opening %crate%'
  duration-ticks: 120
  start-speed-ticks: 1
  end-speed-ticks: 9
  close-delay-ticks: 45
  close-behavior: COMPLETE_REWARD
  sound-tick: BLOCK_NOTE_BLOCK_HAT
  sound-finish: ENTITY_PLAYER_LEVELUP
  filler-material: GRAY_STAINED_GLASS_PANE
  empty-material: BLACK_STAINED_GLASS_PANE
  marker-slot: 4
  marker-material: TORCH
  marker-name: '&a▼ HADIAH ▼'
  result-slot: 22
  highlight-material: LIME_STAINED_GLASS_PANE
  final-glow: true
  result:
    enabled: true
    keep-open-ticks: 45
    show-title: true
    show-actionbar: true
    send-chat: true
    title: '&aKamu Mendapatkan!'
    subtitle: '&f%reward%'
    actionbar: '&aReward: &f%reward%'
    chat: '%prefix% &aKamu mendapatkan reward: &f%reward%&a.'
    sound: ENTITY_PLAYER_LEVELUP
  box:
    marker-slot: 4
    result-slot: 22
    box-slots:
      - 11
      - 12
      - 13
      - 14
      - 15
      - 24
      - 33
      - 42
      - 41
      - 40
      - 39
      - 38
      - 29
      - 20
  spiral:
    marker-slot: 4
    result-slot: 22
    ring-slots:
      - 12
      - 13
      - 14
      - 23
      - 32
      - 41
      - 40
      - 39
      - 30
      - 21
    inner-slots:
      - 22
  snake:
    marker-slot: 4
    result-slot: 22
    path-slots:
      - 10
      - 11
      - 12
      - 13
      - 14
      - 15
      - 16
      - 25
      - 34
      - 43
      - 42
      - 41
      - 40
      - 39
      - 38
      - 37
      - 28
      - 19
      - 20
      - 21
      - 22
      - 23
      - 24
    head-material: LIME_STAINED_GLASS_PANE
    head-name: '&a▶'
  simple:
    marker-slot: 4
    result-slot: 22
    slots:
      - 20
      - 21
      - 22
      - 23
      - 24

effects:
  enabled: true
  interval-ticks: 3
  radius: 0.85
  radius-top: 0.35
  height: 1.45
  points-per-tick: 5
  rings: 3
  speed: 0.32
  y-speed: 0.05
  tornado-shape: true
  center-spark: true
  max-crates-per-tick: 40
  view-distance: 32
  bonemeal-star-count: 2
  bonemeal-star-extra: 0.02

hologram:
  enabled: true
  provider: AUTO
  y-offset: 2.25
  billboard: CENTER
  # FIXED / CENTER / VERTICAL / HORIZONTAL
  line-spacing: 0.22
  update-ticks: 40
  nearest-player-radius: 8
  pages:
    - lines:
        - content: '%crate_prefix%&l⚡ %crate_display% Crate ⚡%crate_suffix%'
          height: 0.22
        - content: '&7Tier: %level_reward%'
          height: 0.22
        - content: '&fKey: %crate_prefix%%key_short_name% Key%crate_suffix%'
          height: 0.22
        - content: '&fKeys Kamu: %crate_prefix%%keys% key%crate_suffix%'
          height: 0.22
        - content: '&eKlik pakai key &7| &f/key shop'
          height: 0.22
  lines:
    - '%crate_prefix%&l⚡ %crate_display% Crate ⚡%crate_suffix%'
    - '&7Tier: %level_reward%'
    - '&fKey: %crate_prefix%%key_short_name% Key%crate_suffix%'
    - '&fKeys Kamu: %crate_prefix%%keys% key%crate_suffix%'
    - '&eKlik pakai key &7| &f/key shop'

shop:
  title: '&8Key Shop'
  quantity-title: '&8Beli %key%'
  filler: BLACK_STAINED_GLASS_PANE

editor:
  default-weight: 10

no-key:
  knockback:
    enabled: true
    strength: 0.65
    y: 0.25
  sound: ENTITY_VILLAGER_NO

crates:
  drop-on-break: true
