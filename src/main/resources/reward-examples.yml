# ==================================================
# VelioraGacha Reward Examples
# File ini hanya contoh. Plugin membaca reward aktif dari rewards.yml.
# Cara pakai:
# - Copy bagian crate yang kamu mau
# - Paste ke rewards.yml
# - /vgcreate reload
#
# Rarity: uncommon, common, rare, epic, mythic
# Type: ITEM atau COMMAND
# ==================================================

# --------------------------------------------------
# CONTOH 1: test crate cepat untuk test animasi
# --------------------------------------------------
rewards:
  test:
    uncommon:
      - { type: ITEM, material: IRON_INGOT, amount: 8, display: '&fIron Ingot x8', weight: 45 }
    common:
      - { type: ITEM, material: EMERALD, amount: 4, display: '&aEmerald x4', weight: 30 }
    rare:
      - { type: ITEM, material: DIAMOND, amount: 1, display: '&bDiamond x1', weight: 15 }
    epic:
      - { type: ITEM, material: GOLDEN_APPLE, amount: 1, display: '&6Golden Apple x1', weight: 8 }
    mythic:
      - { type: ITEM, material: TOTEM_OF_UNDYING, amount: 1, display: '&eTotem x1', weight: 2 }

